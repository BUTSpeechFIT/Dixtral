# @package _global_
experiment: voxtral_v16
wandb:
  project: llm_exps

model:
  whisper_model: openai/whisper-small
  prefixes_to_preheat: []
  params_to_keep_frozen_keywords:
    - language_model
    - multi_modal_projector

training:
  train_voxtral: True
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  overall_batch_size: null
  remove_timestamps_from_ctc: true
  metric_for_best_model: eval_notsofar1-sdm_cutset_dev_sc_4_wer
  use_fddt_only_n_epochs: 0
  save_steps: 500
  eval_steps: 500
  eval_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: False
  use_lora: True
  warmup_steps: 5000
#  watch_grads: True
  logging_steps: 5
  generation_max_length: 1000
  bf16: false
  bf16_full_eval: false


data:
  use_timestamps: false
  train_text_norm: "voxtral"
  eval_text_norm: "voxtral"
  train_cutsets:
    - ${oc.env:MANIFEST_DIR}/notsofar1/notsofar1-sdm_cutset_train_sc_30s.jsonl.gz
  dev_cutsets:
    - ${oc.env:MANIFEST_DIR}/notsofar1/notsofar1-sdm_cutset_dev_sc_4.jsonl.gz
  eval_cutsets:
    - ${oc.env:MANIFEST_DIR}/notsofar1/notsofar1-sdm_cutset_eval_sc.jsonl.gz
  dataset_weights:
    - 1

